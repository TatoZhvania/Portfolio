<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title">
  <title>GitLab Pipeline</title>
  <defs>
    <linearGradient id="gitlab-bg" x1="18" y1="16" x2="110" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#201531"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="gitlab-top" x1="64" y1="20" x2="64" y2="60" gradientUnits="userSpaceOnUse">
